name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: nestjs_starter
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nestjs_starter"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      PORT: 3000
      API_PREFIX: api
      API_VERSION: '1'
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nestjs_starter?schema=public
      JWT_ACCESS_SECRET: ci-access-secret-at-least-32-characters-long
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: ci-refresh-secret-different-and-32-chars
      JWT_REFRESH_EXPIRES_IN: 7d
      THROTTLE_TTL_MS: 60000
      THROTTLE_LIMIT: 100
      AUTH_THROTTLE_TTL_MS: 60000
      AUTH_THROTTLE_LIMIT: 10
      TRUST_PROXY: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test -- --runInBand

      - name: End-to-end tests
        run: npm run test:e2e -- --runInBand

      - name: Build
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build production image
        run: docker build -t nestjs-production-starter:ci .
